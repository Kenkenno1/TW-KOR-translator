<!doctype html>
<html lang="zh-Hant" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="中韓翻譯" />
  <link rel="apple-touch-icon" href="icon-180.png?v=2" />
  <link rel="icon" type="image/svg+xml" href="icon-180.svg" />
  <title>中韓即時翻譯</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+TC:wght@400;600&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ===== Dark theme (default) ===== */
    [data-theme="dark"]{
      --bg:#0a0c10;
      --panel:rgba(255,255,255,0.05);
      --panel2:rgba(255,255,255,0.02);
      --border:rgba(255,255,255,0.08);
      --muted:rgba(255,255,255,0.6);
      --text:rgba(255,255,255,0.92);
      --danger:rgba(248,113,113,0.95);
      --dangerBg:rgba(248,113,113,0.10);
      --dangerBd:rgba(248,113,113,0.25);
      --success:rgba(16,185,129,0.95);
      --successBg:rgba(16,185,129,0.12);
      --blue:rgba(96,165,250,0.95);
      --blueBg:rgba(96,165,250,0.10);
      --blueBd:rgba(96,165,250,0.30);
      --chipBg:rgba(0,0,0,0.35);
      --chipBd:rgba(255,255,255,0.10);
      --focus:rgba(255,255,255,0.18);
      --toastBg:rgba(20,22,28,0.95);
      --toastBd:rgba(255,255,255,0.12);
      --bodyBg:var(--bg);
      --skelBar:rgba(255,255,255,0.06);
      --outColor:rgba(130,177,255,0.95);
      --accent:#6ee7b7;
      --accentBg:rgba(110,231,183,0.10);
      --accentBd:rgba(110,231,183,0.30);
    }

    /* ===== Light theme ===== */
    [data-theme="light"]{
      --bg:#f4f5f7;
      --panel:rgba(0,0,0,0.03);
      --panel2:rgba(0,0,0,0.01);
      --border:rgba(0,0,0,0.08);
      --muted:rgba(0,0,0,0.50);
      --text:rgba(0,0,0,0.88);
      --danger:rgba(220,53,69,0.95);
      --dangerBg:rgba(220,53,69,0.08);
      --dangerBd:rgba(220,53,69,0.25);
      --success:rgba(22,163,74,0.95);
      --successBg:rgba(22,163,74,0.10);
      --blue:rgba(59,130,246,0.95);
      --blueBg:rgba(59,130,246,0.08);
      --blueBd:rgba(59,130,246,0.25);
      --chipBg:rgba(0,0,0,0.05);
      --chipBd:rgba(0,0,0,0.10);
      --focus:rgba(0,0,0,0.12);
      --toastBg:rgba(255,255,255,0.96);
      --toastBd:rgba(0,0,0,0.10);
      --bodyBg:var(--bg);
      --skelBar:rgba(0,0,0,0.07);
      --outColor:rgba(37,99,235,0.95);
      --accent:#059669;
      --accentBg:rgba(5,150,105,0.08);
      --accentBd:rgba(5,150,105,0.25);
    }

    :root{--radius:16px}

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bodyBg);
      color:var(--text);
      font-family: Inter, "Noto Sans TC", "Noto Sans KR", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing:antialiased;
      overscroll-behavior:none;
    }

    .wrap{
      max-width:480px;
      margin:0 auto;
      padding:8px;
      padding-top:max(8px, env(safe-area-inset-top));
      padding-bottom:max(8px, env(safe-area-inset-bottom));
      height:100vh;
      height:100dvh;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    /* ===== Top bar ===== */
    .toprow{
      display:flex;
      align-items:center;
      gap:6px;
      flex-shrink:0;
    }
    .app-title{
      font-size:13px;
      font-weight:600;
      color:var(--muted);
      letter-spacing:0.3px;
      white-space:nowrap;
    }

    /* ===== Buttons ===== */
    .icon{
      border:0;
      background:transparent;
      color:var(--muted);
      border-radius:12px;
      padding:8px 10px;
      font-size:13px;
      line-height:1;
      cursor:pointer;
      transition:opacity 100ms, background 100ms, color 100ms;
      white-space:nowrap;
      -webkit-user-select:none;
      user-select:none;
    }
    .icon:hover{background:rgba(128,128,128,0.08)}
    .icon:active{background:rgba(128,128,128,0.15)}
    .icon:disabled{opacity:0.3;cursor:not-allowed}
    .icon.primary{color:var(--text);font-weight:500}
    .icon.copied{color:var(--success) !important}

    .icon.speaking{
      color:var(--danger);
      background:var(--dangerBg);
      border:1px solid var(--dangerBd);
    }

    /* ===== Glass speak button (output panel) ===== */
    .btn-speak-out{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex:1;
      padding:16px;
      border:1px solid rgba(255,255,255,0.18);
      border-radius:var(--radius);
      font-size:20px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      flex-shrink:0;
      -webkit-user-select:none;
      user-select:none;
      position:relative;
      overflow:hidden;
      /* Glass effect */
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.12) 0%,
        rgba(255,255,255,0.05) 40%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.08) 100%
      );
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      color:var(--text);
      box-shadow:
        0 0 16px rgba(110,231,183,0.12),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.1),
        0 2px 8px rgba(0,0,0,0.15);
      transition:box-shadow 200ms, transform 80ms, border-color 200ms;
      animation:btn-glow 3s ease-in-out infinite;
    }
    .btn-speak-out::before{
      content:"";
      position:absolute;
      top:0;left:-50%;
      width:50%;height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      transform:skewX(-20deg);
      animation:glass-shine 4s ease-in-out infinite;
      pointer-events:none;
    }
    .btn-speak-out:active{transform:scale(0.97)}
    .btn-speak-out.speaking{
      color:var(--danger);
      border-color:var(--dangerBd);
      box-shadow:
        0 0 20px rgba(248,113,113,0.25),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.1),
        0 2px 8px rgba(0,0,0,0.15);
      animation:btn-glow-danger 1.5s ease-in-out infinite;
    }
    @keyframes glass-shine{
      0%,100%{left:-50%}
      50%{left:120%}
    }
    @keyframes btn-glow{
      0%,100%{box-shadow:0 0 12px rgba(110,231,183,0.10),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 22px rgba(110,231,183,0.22),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
    }
    @keyframes btn-glow-danger{
      0%,100%{box-shadow:0 0 12px rgba(248,113,113,0.15),inset 0 1px 0 rgba(255,255,255,0.15),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 24px rgba(248,113,113,0.35),inset 0 1px 0 rgba(255,255,255,0.2),inset 0 -1px 0 rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.12)}
    }
    /* Ready-to-speak highlight after translation completes (mobile) */
    .btn-speak-out.speak-ready{
      border-color:var(--accentBd);
      animation:speak-ready-pulse 0.8s ease-in-out 3;
    }
    @keyframes speak-ready-pulse{
      0%,100%{box-shadow:0 0 12px rgba(110,231,183,0.15),inset 0 1px 0 rgba(255,255,255,0.15),0 2px 8px rgba(0,0,0,0.12);transform:scale(1)}
      50%{box-shadow:0 0 35px rgba(110,231,183,0.50),inset 0 1px 0 rgba(255,255,255,0.25),0 2px 12px rgba(0,0,0,0.15);transform:scale(1.04)}
    }
    [data-theme="light"] .btn-speak-out{
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.7) 0%,
        rgba(255,255,255,0.4) 40%,
        rgba(255,255,255,0.3) 60%,
        rgba(255,255,255,0.6) 100%
      );
      border-color:rgba(0,0,0,0.10);
      box-shadow:
        0 0 12px rgba(5,150,105,0.10),
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 -1px 0 rgba(0,0,0,0.04),
        0 2px 8px rgba(0,0,0,0.06);
    }

    /* ===== Bottom action row (translate + speak) ===== */
    .action-row{
      display:flex;
      gap:10px;
      flex-shrink:0;
    }
    .btn-translate{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      flex:1;
      padding:16px;
      border:none;
      border-radius:var(--radius);
      background:var(--accent);
      color:#000;
      font-size:20px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      transition:opacity 150ms, transform 80ms;
      -webkit-user-select:none;
      user-select:none;
    }
    .btn-translate:active{transform:scale(0.98)}
    .btn-translate:disabled{opacity:0.4;cursor:not-allowed;transform:none}

    /* ===== Divider between panels ===== */
    .panel-divider{
      width:100%;
      height:1px;
      background:var(--border);
      flex-shrink:0;
      margin:2px 0;
    }

    /* ===== Panel ===== */
    .panel{
      position:relative;
      border-radius:var(--radius);
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      border:1px solid var(--border);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
      flex:1;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 10px 4px;
      font-size:12px;
      color:var(--muted);
      flex-shrink:0;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:3px 8px;
      border-radius:10px;
      background:var(--chipBg);
      border:1px solid var(--chipBd);
      color:var(--muted);
      font-size:12px;
      font-weight:500;
    }

    .count{opacity:0.6;font-size:11px}
    .actions{display:flex;align-items:center;gap:2px}

    textarea{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      padding:6px 14px 14px;
      resize:none;
      outline:none;
      font-size:24px;
      font-weight:600;
      line-height:1.75;
      letter-spacing:0.02em;
      flex:1;
      min-height:0;
      overflow:auto;
      font-family:"Noto Serif TC", "Noto Serif KR", "Apple SD Gothic Neo", "Malgun Gothic", serif;
    }

    .output-text{
      margin:0;
      width:100%;
      border:0;
      background:transparent;
      color:var(--outColor);
      padding:6px 14px 14px;
      font-size:24px;
      font-weight:600;
      line-height:1.75;
      letter-spacing:0.02em;
      flex:1;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      outline:none;
      cursor:text;
      font-family:"Noto Serif TC", "Noto Serif KR", "Apple SD Gothic Neo", "Malgun Gothic", serif;
    }
    .output-text:focus{
      box-shadow:inset 0 0 0 1px rgba(128,128,128,0.12);
      border-radius:4px;
    }
    .output-text:empty::before{
      content:attr(data-placeholder);
      color:var(--muted);
      opacity:0.35;
      font-style:italic;
      pointer-events:none;
    }

    /* ===== Skeleton loading ===== */
    @keyframes skeleton-pulse{0%,100%{opacity:0.3}50%{opacity:0.7}}
    .panel.loading .output-text::before{
      content:"" !important;
      display:block;
      height:100%;
      background:
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 0 / 85% 28px,
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 28px / 70% 28px,
        linear-gradient(var(--skelBar) 14px, transparent 14px) 0 56px / 90% 28px;
      background-repeat:no-repeat;
      animation:skeleton-pulse 1.5s ease-in-out infinite;
      border-radius:4px;
    }

    /* ===== Speaking glow ===== */
    .speaking-glow{position:relative}
    .speaking-glow::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      pointer-events:none;
      animation:pulse-glow 1.5s ease-in-out infinite;
    }
    @keyframes pulse-glow{
      0%,100%{box-shadow:inset 0 0 20px rgba(16,185,129,0.05)}
      50%{box-shadow:inset 0 0 30px rgba(16,185,129,0.15)}
    }

    /* ===== TTS stop FAB ===== */
    /* ===== Toast ===== */
    #toastHost{
      position:fixed;
      bottom:max(16px, env(safe-area-inset-bottom, 16px));
      left:50%;
      transform:translateX(-50%);
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:center;
      pointer-events:none;
      max-width:340px;
      width:90%;
    }
    .toast-item{
      background:var(--toastBg);
      color:var(--muted);
      border:1px solid var(--toastBd);
      border-radius:12px;
      padding:10px 16px;
      font-size:13px;
      line-height:1.5;
      white-space:pre-line;
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      opacity:0;
      transform:translateY(8px);
      transition:opacity 120ms ease,transform 120ms ease;
      pointer-events:auto;
      cursor:pointer;
      text-align:center;
    }
    .toast-item.show{opacity:1;transform:translateY(0)}
    .toast-item.out{opacity:0;transform:translateY(8px);transition-duration:180ms}
    .toast-item.toast-error{border-color:var(--dangerBd);background:var(--dangerBg);color:var(--danger)}
    .toast-item.toast-undo{border-color:var(--blueBd);background:var(--blueBg)}
    .toast-item .undo-link{color:var(--blue);font-weight:600;text-decoration:underline;cursor:pointer;margin-left:6px}

    /* ===== Settings overlay ===== */
    .overlay{
      position:fixed;inset:0;
      display:none;
      align-items:flex-end;
      justify-content:center;
      background:rgba(0,0,0,0.55);
      backdrop-filter:blur(8px);
      z-index:50;
    }
    .overlay.show{display:flex}
    .modal{
      width:100%;
      max-width:480px;
      border-radius:22px 22px 0 0;
      background:var(--toastBg);
      border:1px solid var(--toastBd);
      border-bottom:none;
      box-shadow:0 -8px 40px rgba(0,0,0,0.35);
      padding:14px;
      padding-bottom:max(14px, env(safe-area-inset-bottom));
      max-height:85vh;
      overflow-y:auto;
    }
    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      color:var(--muted);
      font-size:12px;
      padding:4px 6px;
    }
    .modal-handle{
      width:36px;
      height:4px;
      border-radius:2px;
      background:rgba(128,128,128,0.3);
      margin:0 auto 8px;
    }
    .field{
      display:grid;
      gap:6px;
      margin-top:10px;
      padding:10px;
      border-radius:14px;
      border:1px solid var(--border);
      background:var(--panel);
    }
    .field label{font-size:12px;color:var(--muted)}
    .in, .modal select{
      width:100%;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(128,128,128,0.06);
      color:var(--text);
      padding:12px;
      outline:none;
      font-size:14px;
      font-family:inherit;
    }
    .in:focus, .modal select:focus{border-color:var(--focus)}
    .tog{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .tog span{font-size:13px;color:var(--muted)}
    .hint{font-size:11px;color:var(--muted);opacity:0.7;padding:4px 6px}
    .hint a{color:var(--accent);text-decoration:none}
    .hint a:hover{text-decoration:underline}

    /* Toggle switch */
    .switch{position:relative;width:44px;height:26px;flex-shrink:0}
    .switch input{opacity:0;width:0;height:0}
    .switch .slider{
      position:absolute;inset:0;
      background:rgba(128,128,128,0.25);
      border-radius:13px;
      cursor:pointer;
      transition:background 200ms;
    }
    .switch .slider::before{
      content:"";
      position:absolute;
      left:3px;top:3px;
      width:20px;height:20px;
      background:#fff;
      border-radius:50%;
      transition:transform 200ms;
    }
    .switch input:checked + .slider{background:var(--accent)}
    .switch input:checked + .slider::before{transform:translateX(18px)}

    /* ===== Mic buttons row ===== */
    .mic-row{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }
    .btn-mic{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      padding:14px 10px;
      border:1px solid rgba(255,255,255,0.12);
      border-radius:var(--radius);
      font-size:15px;
      font-weight:600;
      font-family:inherit;
      cursor:pointer;
      -webkit-user-select:none;
      user-select:none;
      position:relative;
      overflow:hidden;
      transition:box-shadow 200ms, transform 80ms, border-color 200ms, background 200ms;
      /* Glass base */
      background:linear-gradient(
        135deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.04) 40%,
        rgba(255,255,255,0.02) 60%,
        rgba(255,255,255,0.07) 100%
      );
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.08),
        0 2px 8px rgba(0,0,0,0.12);
    }
    .btn-mic::before{
      content:"";
      position:absolute;
      top:0;left:-60%;
      width:50%;height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
      transform:skewX(-20deg);
      animation:glass-shine 5s ease-in-out infinite;
      pointer-events:none;
    }
    .btn-mic:active{transform:scale(0.97)}
    .btn-mic .mic-icon{font-size:20px}
    .btn-mic .mic-lang{font-size:18px;font-weight:600}
    .btn-mic .mic-hint{font-size:11px;opacity:0.5;font-weight:400}

    /* Recording state — fully red button */
    .btn-mic.recording{
      border-color:rgba(220,38,38,0.8);
      background:linear-gradient(
        135deg,
        rgba(220,38,38,0.85) 0%,
        rgba(239,68,68,0.90) 50%,
        rgba(220,38,38,0.85) 100%
      );
      color:#fff;
      animation:mic-pulse 1.5s ease-in-out infinite;
    }
    .btn-mic.recording .mic-icon{
      animation:mic-bounce 0.8s ease-in-out infinite;
      color:#fff;
    }
    .btn-mic.recording .mic-lang{
      color:#fff;
    }
    @keyframes mic-pulse{
      0%,100%{box-shadow:0 0 10px rgba(220,38,38,0.3),inset 0 1px 0 rgba(255,255,255,0.20),0 2px 8px rgba(0,0,0,0.12)}
      50%{box-shadow:0 0 28px rgba(220,38,38,0.55),inset 0 1px 0 rgba(255,255,255,0.25),0 2px 8px rgba(0,0,0,0.12)}
    }
    @keyframes mic-bounce{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.2)}
    }

    /* Blinking border on textarea when mic is recording */
    #srcPanel.recording-active{
      border-color:rgba(220,38,38,0.8);
      animation:recording-border 1s ease-in-out infinite;
    }
    #srcPanel.recording-active textarea{
      caret-color:var(--danger);
    }
    @keyframes recording-border{
      0%,100%{border-color:rgba(220,38,38,0.8);box-shadow:0 0 18px rgba(220,38,38,0.35),inset 0 0 8px rgba(220,38,38,0.08)}
      50%{border-color:rgba(220,38,38,0.3);box-shadow:0 0 6px rgba(220,38,38,0.10),inset 0 0 2px rgba(220,38,38,0.02)}
    }

    /* Light theme mic */
    [data-theme="light"] .btn-mic{
      border-color:rgba(0,0,0,0.08);
      background:linear-gradient(135deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0.5) 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(0,0,0,0.03),0 2px 8px rgba(0,0,0,0.05);
    }

    /* Unsupported state */
    .btn-mic:disabled{opacity:0.35;cursor:not-allowed;animation:none}

    @media (prefers-reduced-motion: reduce){
      .toast-item,.toast-item.show,.toast-item.out{transform:translateY(0)}
      .panel.loading .output-text::before{animation:none;opacity:0.5}
      .btn-mic.recording{animation:none}
      .btn-mic.recording .mic-icon{animation:none}
      #srcPanel.recording-active{animation:none;border-color:rgba(220,38,38,0.8)}
      .btn-speak-out.speak-ready{animation:none}
      .btn-speak-out,.btn-speak-out::before,
      .btn-mic::before,
      .speaking-glow::after{animation:none}
    }
  </style>
</head>
<body>

  <!-- Settings overlay (bottom sheet style for iPhone) -->
  <div class="overlay" id="settingsOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-handle"></div>
      <div class="modalHead">
        <span style="letter-spacing:0.15em;text-transform:uppercase;font-weight:600">設定</span>
        <button class="icon" id="btnCloseSettings" aria-label="關閉設定" title="關閉">✕</button>
      </div>

      <div class="field">
        <label for="apiKey">OpenAI API Key</label>
        <input class="in" id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />
        <div class="hint"><a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">還沒有 API Key？前往 OpenAI 申請 →</a></div>
      </div>

      <div class="field">
        <div class="tog">
          <span>輸入時自動翻譯</span>
          <label class="switch"><input id="auto" type="checkbox" /><span class="slider"></span></label>
        </div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- Top bar -->
    <div class="toprow">
      <span class="app-title">🇰🇷 中韓翻譯</span>
      <span style="flex:1"></span>
      <button class="icon" id="btnTheme" aria-label="切換主題" title="切換主題">◑</button>
      <button class="icon" id="btnSettings" aria-label="設定" title="設定">⚙</button>
    </div>

    <!-- Mic buttons -->
    <div class="mic-row">
      <button class="btn-mic" id="btnMicZh" aria-label="中文語音輸入">
        <span class="mic-icon">🎤</span>
        <span class="mic-lang">中文</span>
      </button>
      <button class="btn-mic" id="btnMicKo" aria-label="한국어 음성 입력">
        <span class="mic-icon">🎤</span>
        <span class="mic-lang">한국어</span>
      </button>
    </div>

    <!-- Source panel -->
    <section class="panel" id="srcPanel">
      <div class="bar">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="chip" id="srcChip">中文</span>
          <span class="count" id="srcCount">0</span>
        </div>
        <div class="actions">
          <button class="icon" id="btnSpeakSrc" aria-label="朗讀原文" title="朗讀">🔊</button>
          <button class="icon" id="btnCopySrc" aria-label="複製原文" title="複製">⎘</button>
          <button class="icon" id="btnClear" aria-label="清除" title="清除">⌫</button>
        </div>
      </div>
      <textarea id="src" placeholder="輸入中文或韓文…" aria-label="原文輸入"></textarea>
    </section>

    <!-- Divider between panels -->
    <div class="panel-divider"></div>

    <!-- Output panel -->
    <section class="panel" id="outPanel">
      <div class="bar">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="chip" id="outChip">한국어</span>
          <span class="count" id="outStatus"></span>
          <span class="count" id="outCount"></span>
        </div>
        <div class="actions">
          <button class="icon" id="btnCopyOut" aria-label="複製翻譯" title="複製">⎘</button>
        </div>
      </div>
      <div class="output-text" id="out" contenteditable="true" role="textbox" aria-label="翻譯結果" data-placeholder="翻譯結果會顯示在這裡…"></div>
    </section>

    <!-- Action row: Translate + Speak/Mute -->
    <div class="action-row">
      <button class="btn-translate" id="btnTranslate" aria-label="翻譯">翻譯</button>
      <button class="btn-speak-out" id="btnSpeakOut" aria-label="朗讀">🔊 朗讀</button>
    </div>
  </div>

  <!-- Toast host -->
  <div id="toastHost"></div>
